<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Finance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080d1a;--surface:#0f1729;--surface2:#162035;--border:#1c2b45;--accent:#4f8ef7;--accent2:#7c6af7;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--text:#eef2ff;--muted:#5d6e8a;--radius:14px}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:24px}
h1{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:28px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.stat-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:-1px}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-value.yellow{color:var(--yellow)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:18px}
.form-group{margin-bottom:14px}
label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--accent)}
.btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;padding:13px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:4px}
.btn:hover{opacity:.88}
.tx-list{display:flex;flex-direction:column;gap:10px;max-height:320px;overflow-y:auto}
.tx-item{display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border-radius:10px;padding:12px 14px}
.tx-left{display:flex;align-items:center;gap:10px}
.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-name{font-size:14px;font-weight:500}
.tx-cat{font-size:11px;color:var(--muted);margin-top:2px}
.tx-amount{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700}
.tx-amount.income{color:var(--green)}
.tx-amount.expense{color:var(--red)}
.bar-group{display:flex;flex-direction:column;gap:12px}
.bar-row{display:flex;flex-direction:column;gap:4px}
.bar-meta{display:flex;justify-content:space-between;font-size:12px}
.bar-meta span:first-child{color:var(--text);font-weight:500}
.bar-meta span:last-child{color:var(--muted)}
.bar-track{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:32px 0}
.delete-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 0 0 10px;transition:color .2s}
.delete-btn:hover{color:var(--red)}
</style>
</head>
<body>
<h1>💰 My Finance Dashboard</h1>
<p class="subtitle">Track your income, expenses and budget in one place</p>

<div class="grid">
  <div class="stat-card"><div class="stat-label">Total Income</div><div class="stat-value green" id="totalIncome">£0.00</div></div>
  <div class="stat-card"><div class="stat-label">Total Expenses</div><div class="stat-value red" id="totalExpenses">£0.00</div></div>
  <div class="stat-card"><div class="stat-label">Remaining</div><div class="stat-value yellow" id="remaining">£0.00</div></div>
</div>

<div class="two-col">
  <div class="card">
    <div class="card-title">Add Transaction</div>
    <div class="form-group"><label>Description</label><input type="text" id="desc" placeholder="e.g. Monthly salary"/></div>
    <div class="form-group"><label>Amount (£)</label><input type="number" id="amt" placeholder="0.00" min="0" step="0.01"/></div>
    <div class="form-group"><label>Type</label>
      <select id="type">
        <option value="income">💚 Income</option>
        <option value="expense">🔴 Expense</option>
      </select>
    </div>
    <div class="form-group"><label>Category</label>
      <select id="category">
        <option value="💼 Salary">💼 Salary</option>
        <option value="🍔 Food">🍔 Food</option>
        <option value="🚌 Transport">🚌 Transport</option>
        <option value="🎮 Entertainment">🎮 Entertainment</option>
        <option value="🏠 Rent">🏠 Rent</option>
        <option value="👗 Shopping">👗 Shopping</option>
        <option value="💊 Health">💊 Health</option>
        <option value="📚 Education">📚 Education</option>
        <option value="💸 Other">💸 Other</option>
      </select>
    </div>
    <button class="btn" onclick="addTransaction()">Add Transaction</button>
  </div>

  <div class="card">
    <div class="card-title">Spending by Category</div>
    <div class="bar-group" id="barGroup"><div class="empty">No expenses yet</div></div>
  </div>
</div>

<div class="card">
  <div class="card-title">Transactions</div>
  <div class="tx-list" id="txList"><div class="empty">No transactions yet — add one above</div></div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem('fxTransactions') || '[]');

const CAT_COLORS = {
  '💼 Salary':'#4f8ef7','🍔 Food':'#f97316','🚌 Transport':'#8b5cf6',
  '🎮 Entertainment':'#ec4899','🏠 Rent':'#14b8a6','👗 Shopping':'#f59e0b',
  '💊 Health':'#34d399','📚 Education':'#6366f1','💸 Other':'#94a3b8'
};

function fmt(n){return'£'+parseFloat(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}

function render(){
  const income = transactions.filter(t=>t.type==='income').reduce((a,t)=>a+t.amt,0);
  const expenses = transactions.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amt,0);
  document.getElementById('totalIncome').textContent=fmt(income);
  document.getElementById('totalExpenses').textContent=fmt(expenses);
  const rem = income - expenses;
  const remEl = document.getElementById('remaining');
  remEl.textContent=fmt(rem);
  remEl.className='stat-value '+(rem>=0?'yellow':'red');

  // Transactions list
  const list = document.getElementById('txList');
  if(!transactions.length){list.innerHTML='<div class="empty">No transactions yet — add one above</div>';return;}
  list.innerHTML = [...transactions].reverse().map((t,ri)=>{
    const i = transactions.length-1-ri;
    return`<div class="tx-item">
      <div class="tx-left">
        <div class="tx-icon" style="background:${CAT_COLORS[t.cat]||'#333'}22">${t.cat.split(' ')[0]}</div>
        <div><div class="tx-name">${t.desc}</div><div class="tx-cat">${t.cat}</div></div>
      </div>
      <div style="display:flex;align-items:center">
        <span class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amt)}</span>
        <button class="delete-btn" onclick="deleteTransaction(${i})">×</button>
      </div>
    </div>`;
  }).join('');

  // Bars
  const catTotals = {};
  transactions.filter(t=>t.type==='expense').forEach(t=>{
    catTotals[t.cat]=(catTotals[t.cat]||0)+t.amt;
  });
  const maxVal = Math.max(...Object.values(catTotals),1);
  const barGroup = document.getElementById('barGroup');
  if(!Object.keys(catTotals).length){barGroup.innerHTML='<div class="empty">No expenses yet</div>';return;}
  barGroup.innerHTML = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`
    <div class="bar-row">
      <div class="bar-meta"><span>${cat}</span><span>${fmt(val)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(val/maxVal*100).toFixed(1)}%;background:${CAT_COLORS[cat]||'#4f8ef7'}"></div></div>
    </div>`).join('');
}

function addTransaction(){
  const desc=document.getElementById('desc').value.trim();
  const amt=parseFloat(document.getElementById('amt').value);
  const type=document.getElementById('type').value;
  const cat=document.getElementById('category').value;
  if(!desc||isNaN(amt)||amt<=0){alert('Please fill in description and a valid amount.');return;}
  transactions.push({desc,amt,type,cat,date:new Date().toLocaleDateString('en-GB')});
  localStorage.setItem('fxTransactions',JSON.stringify(transactions));
  document.getElementById('desc').value='';
  document.getElementById('amt').value='';
  render();
}

function deleteTransaction(i){
  transactions.splice(i,1);
  localStorage.setItem('fxTransactions',JSON.stringify(transactions));
  render();
}

render();
</script>
</body>
</html>
